<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Toby Thomson - Gryphon II</title>
  <meta name="description" content="2nd stab at taking the UK amateur rocketry altitude record">
  <link rel="preload" href="/fonts/InterVariable.woff2" as="font" type="font/woff2" crossorigin>
  <style>/* ---------- Font ---------- */

@font-face {
  font-family: "Inter";
  src: url("/fonts/InterVariable.woff2") format("woff2");
  font-weight: 100 900;
  font-style: normal;
  font-display: block;
}

/* ---------- Reset ---------- */

*,
*::before,
*::after {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  padding: 0;
}

html {
  background: var(--color-bg);
  scrollbar-gutter: stable;
}

/* ---------- Theme (dark, always — light only on print) ---------- */

:root {
  --color-bg: #111214;
  --color-text: #e8e8e6;
  --color-text-muted: #9a9a98;
  --color-border: #2a2b2d;
  --color-link: #e8e8e6;
  --content-max-width: 720px;
  --content-padding: 1.5rem;
}

/* ---------- Base ---------- */

body {
  background: var(--color-bg);
  color: var(--color-text);
  font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-weight: 400;
  line-height: 1.6;
  font-size: 1rem;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

a {
  color: var(--color-link);
}

a:hover,
a:focus-visible {
  opacity: 0.7;
}

a:focus-visible,
button:focus-visible {
  outline: 2px solid var(--color-text);
  outline-offset: 2px;
}

h1, h2, h3, h4, h5, h6 {
  font-weight: 600;
  line-height: 1.25;
  margin: 2rem 0 0.75rem;
}

h1:first-child,
h2:first-child,
h3:first-child {
  margin-top: 0;
}

p {
  margin: 0 0 1rem;
}

img {
  max-width: 100%;
  display: block;
}

/* ---------- Layout shell ---------- */

.shell {
  max-width: var(--content-max-width);
  margin: 0 auto;
  padding: var(--content-padding);
}

/* ---------- Header ---------- */

.site-header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 0.5rem 1.5rem;
  padding-bottom: 1.5rem;
  margin-bottom: 1.5rem;
  border-bottom: 1px solid var(--color-border);
}

.site-name {
  font-weight: 600;
  text-decoration: none;
  font-size: 1.5rem;
}

.site-nav {
  display: flex;
  gap: 1.25rem;
}

.site-nav a {
  text-decoration: none;
  color: var(--color-text-muted);
}

.site-nav a:hover,
.site-nav a:focus-visible {
  color: var(--color-text);
  opacity: 1;
}

.site-nav a[aria-current="page"] {
  color: var(--color-text);
}

/* ---------- Content ---------- */

.content {
  padding-bottom: 1.5rem;
}

/* ---------- Portfolio ---------- */

.project-list {
  list-style: none;
  margin: 0;
  padding: 0;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}

.project-desc {
  color: var(--color-text-muted);
}

/* ---------- Figure ---------- */

.figure {
  position: relative;
  margin: 1.5rem 0 0;
}

.figure img {
  width: 100%;
  border-radius: 4px;
}

.figure figcaption {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  padding: 0.75rem 1rem;
  background: rgba(0, 0, 0, 0.5);
  color: #fff;
  font-size: 0.85rem;
  border-radius: 0 0 4px 4px;
}

/* ---------- Project page ---------- */

.back-link {
  display: inline-block;
  margin-bottom: 1.5rem;
  text-decoration: none;
  color: var(--color-text-muted);
  font-size: 0.9rem;
}

.back-link:hover {
  color: var(--color-text);
  opacity: 1;
}

/* ---------- Print: force light mode ---------- */

@media print {
  :root {
    --color-bg: #ffffff;
    --color-text: #111111;
    --color-text-muted: #444444;
    --color-border: #cccccc;
    --color-link: #111111;
  }

  html,
  body {
    background: var(--color-bg);
  }

  .figure figcaption,
  .figure figcaption a {
    color: #fff;
  }
}
</style>
</head>
<body>
  <div class="shell">
    <header class="site-header">
      <span class="site-name">Toby Thomson</span>
      <nav class="site-nav">
        <a href="/">About</a>
        <a href="/portfolio/">Portfolio</a>
        <a href="/contact/">Contact</a>
      </nav>
    </header>
    <main class="content">
      
<h1>Gryphon II</h1>
<h2>About</h2>


    </main>
  </div>
</body>
</html>
